<!DOCTYPE html>
<html lang="es">
<head>
    <meta property="og:type" content="website">
<meta property="og:title" content='La Calculadora de "Fugas de Capital"'>
<meta property="og:description" content="Descubre exactamente cuánto dinero estás perdiendo este mes en WhatsApp (y cómo recuperarlo).">
<meta property="og:image" content="https://robertfibonacci.github.io/Calculadora-de-Perdidas-/Calculadora.jpg">
<meta property="og:url" content="https://robertfibonacci.github.io/Calculadora-de-Perdidas-/index.html">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://robertfibonacci.github.io/Calculadora-de-Perdidas-/Calculadora.jpg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Fugas - Prospecta</title>
    
    <!-- Importamos Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Importamos React para la lógica -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Importamos Babel para que el navegador entienda el código moderno -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #020617; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- Generación de estrellas para la cabecera de la tarjeta ---
        const headerStars = Array.from({ length: 60 }).map((_, i) => ({
          id: i,
          x: Math.random() * 600,
          y: Math.random() * 200,
          r: Math.random() * 1.5 + 0.5,
          opacity: Math.random() * 0.4 + 0.1,
          dur: `${Math.random() * 3 + 2}s`,
          delay: `${Math.random() * 2}s`
        }));

        function HeaderConstellations() {
          return (
            <div 
              className="absolute top-0 left-0 w-full h-64 pointer-events-none overflow-hidden z-0"
              style={{ 
                WebkitMaskImage: 'linear-gradient(to bottom, rgba(0,0,0,1) 40%, rgba(0,0,0,0) 100%)', 
                maskImage: 'linear-gradient(to bottom, rgba(0,0,0,1) 40%, rgba(0,0,0,0) 100%)' 
              }}
            >
              <svg viewBox="0 0 600 200" preserveAspectRatio="xMidYMid slice" className="w-full h-full opacity-90">
                <defs>
                  <filter id="starGlow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="1.5" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                  </filter>
                </defs>

                {headerStars.map((star) => (
                  <circle 
                    key={star.id} 
                    cx={star.x} 
                    cy={star.y} 
                    r={star.r} 
                    fill="white" 
                    opacity={star.opacity}
                  >
                    <animate 
                      attributeName="opacity" 
                      values={`${star.opacity};1;${star.opacity}`} 
                      dur={star.dur} 
                      begin={star.delay}
                      repeatCount="indefinite" 
                    />
                  </circle>
                ))}

                {/* Constelación de LEO */}
                <g filter="url(#starGlow)" transform="translate(85, 10) scale(0.45)">
                  <g stroke="rgba(255, 240, 200, 0.3)" strokeWidth="1.5" strokeDasharray="3 4" fill="none" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M 60 140 L 45 90 L 80 40 L 115 25 L 130 50" />
                    <path d="M 60 140 L 160 170 L 180 110 L 80 40" />
                    <path d="M 180 110 L 250 130 L 160 170" />
                  </g>
                  <g fill="white" stroke="none">
                    <circle cx="60" cy="140" r="5" opacity="0.9" />
                    <circle cx="45" cy="90" r="3" opacity="0.8" />
                    <circle cx="80" cy="40" r="4" opacity="0.8" />
                    <circle cx="115" cy="25" r="3" opacity="0.8" />
                    <circle cx="130" cy="50" r="3" opacity="0.8" />
                    <circle cx="160" cy="170" r="4" opacity="0.8" />
                    <circle cx="180" cy="110" r="4.5" opacity="0.8" />
                    <circle cx="250" cy="130" r="4.5" opacity="0.9" />
                  </g>
                </g>

                {/* Constelación de PISCIS */}
                <g filter="url(#starGlow)" transform="translate(255, 10) scale(0.45)">
                  <g stroke="rgba(255, 240, 200, 0.3)" strokeWidth="1.5" strokeDasharray="3 4" fill="none" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M 450 170 Q 480 110 540 50" />
                    <path d="M 450 170 Q 400 140 330 80" />
                    <path d="M 540 50 L 565 30 L 585 55 L 555 70 Z" />
                    <path d="M 330 80 L 305 60 L 285 75 L 305 100 Z" />
                  </g>
                  <g fill="white" stroke="none">
                    <circle cx="450" cy="170" r="5" opacity="0.9" />
                    <circle cx="540" cy="50" r="3" opacity="0.8" />
                    <circle cx="565" cy="30" r="3" opacity="0.8" />
                    <circle cx="585" cy="55" r="3" opacity="0.8" />
                    <circle cx="555" cy="70" r="3" opacity="0.8" />
                    <circle cx="330" cy="80" r="3" opacity="0.8" />
                    <circle cx="305" cy="60" r="3" opacity="0.8" />
                    <circle cx="285" cy="75" r="3" opacity="0.8" />
                    <circle cx="305" cy="100" r="3" opacity="0.8" />
                  </g>
                </g>
              </svg>
            </div>
          );
        }

        // Iconos SVG simplificados como funciones puras
        function TrendingDownIcon({ className, strokeWidth = 2 }) {
          return (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
              <polyline points="22 17 13.5 8.5 8.5 13.5 2 7"></polyline>
              <polyline points="16 17 22 17 22 11"></polyline>
            </svg>
          );
        }

        function ShieldAlertIcon({ className }) {
          return (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
              <path d="M12 8v4"></path>
              <path d="M12 16h.01"></path>
            </svg>
          );
        }

        function ArrowRightIcon({ className }) {
          return (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          );
        }

        function StarIcon({ className, style }) {
          return (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className={className} style={style}>
              <path d="M12 2L14.4 9.6L22 12L14.4 14.4L12 22L9.6 14.4L2 12L9.6 9.6L12 2Z" />
            </svg>
          );
        }

        function FileTextIcon({ className, strokeWidth = 2 }) {
          return (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
              <polyline points="14 2 14 8 20 8"></polyline>
              <line x1="16" y1="13" x2="8" y2="13"></line>
              <line x1="16" y1="17" x2="8" y2="17"></line>
              <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
          );
        }

        function InfoIcon({ className, strokeWidth = 2 }) {
          return (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="16" x2="12" y2="12"></line>
              <line x1="12" y1="8" x2="12.01" y2="8"></line>
            </svg>
          );
        }

        function AlertOctagonIcon({ className, strokeWidth = 2 }) {
          return (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
              <polygon points="7.86 2 16.14 2 22 7.86 22 16.14 16.14 22 7.86 22 2 16.14 2 7.86 7.86 2"></polygon>
              <line x1="12" y1="8" x2="12" y2="12"></line>
              <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
          );
        }

        function HeartCrackIcon({ className, strokeWidth = 2 }) {
          return (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
              <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"></path>
              <path d="m12 13-1-1 2-2-3-3 2-2"></path>
            </svg>
          );
        }

        function ZapIcon({ className, strokeWidth = 2 }) {
          return (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
            </svg>
          );
        }

        function PhoneIcon({ className, strokeWidth = 2 }) {
          return (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
            </svg>
          );
        }

        function CalendarIcon({ className, strokeWidth = 2 }) {
          return (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
          );
        }

        function App() {
          const [isHovered, setIsHovered] = useState(false);
          const [step, setStep] = useState(1); 
          
          const [formData, setFormData] = useState({
            prospectos: '',
            valor: '',
            perdidos: ''
          });
          
          const [perdidaMensual, setPerdidaMensual] = useState(0);

          const handleInputChange = (e) => {
            setFormData({
              ...formData,
              [e.target.name]: e.target.value
            });
          };

          const handleCalculate = () => {
            const prospectosPerdidos = parseFloat(formData.perdidos) || 0;
            const valorServicio = parseFloat(formData.valor) || 0;
            
            const perdidaCalculada = prospectosPerdidos * valorServicio;
            setPerdidaMensual(perdidaCalculada);
            
            setStep(3);
          };

          const formatCurrency = (value) => {
            return new Intl.NumberFormat('es-MX', { 
              style: 'currency', 
              currency: 'MXN', 
              maximumFractionDigits: 0 
            }).format(value);
          };

          return (
            <div className="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 flex flex-col items-center p-4 sm:p-8 font-sans text-slate-100 relative">
              
              {/* Elementos decorativos de fondo */}
              <div className="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
                <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-red-500/10 rounded-full blur-[120px]"></div>
                <div className="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-amber-500/10 rounded-full blur-[120px]"></div>
              </div>

              <div className="relative z-10 w-full max-w-2xl my-auto">
                <div className="absolute inset-0 rounded-3xl shadow-[0_0_50px_rgba(249,115,22,0.4),0_0_80px_rgba(239,68,68,0.2)] animate-pulse pointer-events-none"></div>

                <main className="relative w-full bg-white/[0.03] backdrop-blur-xl border border-white/10 rounded-3xl shadow-2xl overflow-hidden">
                  <div className="h-1.5 w-full bg-gradient-to-r from-red-500 via-orange-500 to-amber-500 relative z-20"></div>

                  <HeaderConstellations />

                  <div className="p-8 md:p-12 relative z-10 transition-all duration-500">
                    
                    {/* PANTALLA 1: EL GANCHO */}
                    {step === 1 && (
                      <div className="animate-in fade-in zoom-in duration-500">
                        <div className="flex justify-center mb-8">
                          <div className="bg-red-500/10 p-4 rounded-2xl border border-red-500/20 shadow-[0_0_30px_rgba(239,68,68,0.15)] relative backdrop-blur-sm">
                            <TrendingDownIcon className="w-10 h-10 text-red-400" strokeWidth={1.5} />
                          </div>
                        </div>

                        <h1 className="text-3xl md:text-4xl font-extrabold text-center leading-tight tracking-tight mb-6">
                          La Calculadora de <span className="text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-orange-400">"Fugas de Capital"</span>: 
                          <br className="hidden md:block" />
                          <span className="text-2xl md:text-3xl font-semibold text-slate-300 mt-2 block">
                            Descubre exactamente cuánto dinero estás perdiendo este mes en WhatsApp <span className="text-slate-400 font-normal">(y cómo recuperarlo).</span>
                          </span>
                        </h1>

                        <div className="space-y-5 text-slate-300 text-lg leading-relaxed text-center mb-10">
                          <p>
                            La mayoría de los profesionales creen que su problema es la falta de prospectos. <strong className="text-white font-semibold">Falso.</strong> Tu problema es que tienes una tubería rota.
                          </p>
                          <p>
                            Enviar catálogos y responder con precios sin una estrategia de persuasión activa la resistencia de tus clientes.
                          </p>
                        </div>

                        <div className="bg-red-950/30 border border-red-900/50 rounded-xl p-5 flex items-start gap-4 mb-10">
                          <ShieldAlertIcon className="w-6 h-6 text-red-400 flex-shrink-0 mt-0.5" />
                          <p className="text-red-200 text-sm md:text-base italic">
                            <strong className="text-red-400 font-semibold not-italic">Advertencia:</strong> Ver tus propios números suele ser incómodo.
                          </p>
                        </div>

                        <div className="flex justify-center">
                          <button 
                            onClick={() => setStep(2)}
                            onMouseEnter={() => setIsHovered(true)}
                            onMouseLeave={() => setIsHovered(false)}
                            className="group relative inline-flex items-center justify-center gap-3 px-8 py-4 bg-gradient-to-r from-orange-500 to-red-600 hover:from-orange-400 hover:to-red-500 text-white text-lg font-bold rounded-full transition-all duration-300 shadow-[0_0_20px_rgba(239,68,68,0.3)] hover:shadow-[0_0_30px_rgba(239,68,68,0.5)] transform hover:-translate-y-1 overflow-hidden"
                          >
                            <div className="absolute inset-0 overflow-hidden rounded-full pointer-events-none">
                              <StarIcon className="absolute top-2 left-6 w-3 h-3 text-white/80 animate-pulse" style={{ animationDelay: '0ms', animationDuration: '2s' }} />
                              <StarIcon className="absolute bottom-2 left-12 w-2 h-2 text-white/50 animate-pulse" style={{ animationDelay: '700ms', animationDuration: '3s' }} />
                              <StarIcon className="absolute top-2 right-14 w-2 h-2 text-white/60 animate-pulse" style={{ animationDelay: '300ms', animationDuration: '2.5s' }} />
                              <StarIcon className="absolute bottom-2 right-8 w-3 h-3 text-white/90 animate-pulse" style={{ animationDelay: '1000ms', animationDuration: '2s' }} />
                            </div>

                            <div className="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-in-out"></div>
                            <span className="relative z-10 tracking-wide uppercase text-sm md:text-base">Iniciar Diagnóstico</span>
                            <ArrowRightIcon className={`relative z-10 w-5 h-5 transition-transform duration-300 ${isHovered ? 'translate-x-1' : ''}`} />
                          </button>
                        </div>
                      </div>
                    )}

                    {/* PANTALLA 2: LOS DATOS (EL SONDEO) */}
                    {step === 2 && (
                      <div className="animate-in fade-in slide-in-from-bottom-4 duration-500">
                        <div className="flex justify-center mb-8">
                          <div className="bg-amber-500/10 p-4 rounded-2xl border border-amber-500/20 shadow-[0_0_30px_rgba(245,158,11,0.15)] relative backdrop-blur-sm">
                            <FileTextIcon className="w-10 h-10 text-amber-400" strokeWidth={1.5} />
                          </div>
                        </div>

                        <h2 className="text-2xl md:text-3xl font-extrabold text-center leading-tight tracking-tight mb-4">
                          PASO 1: Los Datos <span className="text-amber-400">(El Sondeo)</span>
                        </h2>
                        
                        <p className="text-slate-300 text-lg leading-relaxed text-center mb-10">
                          Ingresa tus números actuales para evaluar tu situación.
                        </p>

                        <div className="space-y-6 mb-10 max-w-lg mx-auto">
                          {/* Pregunta 1 */}
                          <div>
                            <div className="flex flex-row items-start sm:items-center justify-between mb-2 gap-2">
                              <label className="block text-slate-300 text-sm md:text-base font-medium">
                                ¿Cuántos prospectos te contactan al mes?
                              </label>
                              <div className="group relative flex items-center cursor-help mt-1 sm:mt-0">
                                <InfoIcon className="w-5 h-5 text-slate-500 group-hover:text-amber-400 transition-colors flex-shrink-0" />
                                <div className="absolute bottom-full right-0 mb-2 w-56 sm:w-64 p-3 bg-slate-900 border border-slate-700 shadow-2xl rounded-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 z-50 text-xs text-slate-300 pointer-events-none">
                                  <span className="block font-semibold text-amber-400 mb-1">Detalle:</span>
                                  Suma todos los mensajes de WhatsApp, DMs de redes sociales o llamadas de personas interesadas.
                                </div>
                              </div>
                            </div>
                            <input 
                              type="number" 
                              name="prospectos" 
                              value={formData.prospectos} 
                              onChange={handleInputChange} 
                              className="w-full bg-slate-900/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all" 
                              placeholder="Ej. 100" 
                            />
                          </div>

                          {/* Pregunta 2 */}
                          <div>
                            <div className="flex flex-row items-start sm:items-center justify-between mb-2 gap-2">
                              <label className="block text-slate-300 text-sm md:text-base font-medium">
                                ¿Cuál es el valor promedio de tu servicio/producto?
                              </label>
                              <div className="group relative flex items-center cursor-help mt-1 sm:mt-0">
                                <InfoIcon className="w-5 h-5 text-slate-500 group-hover:text-amber-400 transition-colors flex-shrink-0" />
                                <div className="absolute bottom-full right-0 mb-2 w-56 sm:w-64 p-3 bg-slate-900 border border-slate-700 shadow-2xl rounded-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 z-50 text-xs text-slate-300 pointer-events-none">
                                  <span className="block font-semibold text-amber-400 mb-1">Detalle:</span>
                                  Ingresa el precio de tu producto más vendido o ticket promedio.
                                </div>
                              </div>
                            </div>
                            <div className="relative">
                              <span className="absolute left-4 top-3 text-slate-500">$</span>
                              <input 
                                type="number" 
                                name="valor" 
                                value={formData.valor} 
                                onChange={handleInputChange} 
                                className="w-full bg-slate-900/50 border border-white/10 rounded-xl pl-8 pr-4 py-3 text-white focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all" 
                                placeholder="Ej. 500" 
                              />
                            </div>
                          </div>

                          {/* Pregunta 3 */}
                          <div>
                            <div className="flex flex-row items-start sm:items-center justify-between mb-2 gap-2">
                              <label className="block text-slate-300 text-sm md:text-base font-medium leading-tight">
                                ¿Cuántos de esos prospectos te dejan "en visto" o dicen "lo voy a pensar"?
                              </label>
                              <div className="group relative flex items-center cursor-help mt-1 sm:mt-0">
                                <InfoIcon className="w-5 h-5 text-slate-500 group-hover:text-amber-400 transition-colors flex-shrink-0" />
                                <div className="absolute bottom-full right-0 mb-2 w-56 sm:w-64 p-3 bg-slate-900 border border-slate-700 shadow-2xl rounded-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 z-50 text-xs text-slate-300 pointer-events-none">
                                  <span className="block font-semibold text-amber-400 mb-1">Detalle:</span>
                                  Anota la cantidad exacta de personas que preguntan, pero al final no compran.
                                </div>
                              </div>
                            </div>
                            <input 
                              type="number" 
                              name="perdidos" 
                              value={formData.perdidos} 
                              onChange={handleInputChange} 
                              className="w-full bg-slate-900/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all" 
                              placeholder="Ej. 80" 
                            />
                          </div>
                        </div>

                        <div className="flex justify-center">
                          <button 
                            onClick={handleCalculate}
                            disabled={!formData.perdidos || !formData.valor}
                            onMouseEnter={() => setIsHovered(true)}
                            onMouseLeave={() => setIsHovered(false)}
                            className="group relative inline-flex items-center justify-center gap-3 px-8 py-4 bg-gradient-to-r from-orange-500 to-red-600 hover:from-orange-400 hover:to-red-500 text-white text-lg font-bold rounded-full transition-all duration-300 shadow-[0_0_20px_rgba(239,68,68,0.3)] hover:shadow-[0_0_30px_rgba(239,68,68,0.5)] transform hover:-translate-y-1 overflow-hidden disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none"
                          >
                            <div className="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-in-out"></div>
                            <span className="relative z-10 tracking-wide uppercase text-sm md:text-base">Calcular mi Pérdida</span>
                            <ArrowRightIcon className={`relative z-10 w-5 h-5 transition-transform duration-300 ${isHovered ? 'translate-x-1' : ''}`} />
                          </button>

                      </div>
                    )}

                    {/* PANTALLA 3: EL RESULTADO (EL DOLOR) */}
                    {step === 3 && (
                      <div className="animate-in fade-in zoom-in duration-700 text-center">
                        
                        <div className="flex justify-center mb-8">
                          <div className="bg-red-500/10 p-5 rounded-full border border-red-500/30 shadow-[0_0_40px_rgba(239,68,68,0.3)] relative backdrop-blur-sm animate-pulse">
                            <AlertOctagonIcon className="w-12 h-12 text-red-500" strokeWidth={2} />
                          </div>
                        </div>

                        <h2 className="text-2xl md:text-4xl font-extrabold text-slate-100 mb-4 tracking-tight">
                          El Resultado: Tu Impuesto por Inacción.
                        </h2>
                        
                        <p className="text-lg md:text-xl text-slate-300 mb-8 max-w-lg mx-auto">
                          Actualmente estás perdiendo
                        </p>

                        <div className="bg-red-950/40 border border-red-500/40 rounded-3xl p-8 md:p-10 mb-10 relative overflow-hidden group">
                          <div className="absolute inset-0 bg-red-500/5 group-hover:bg-red-500/10 transition-colors duration-500"></div>
                          
                          <h3 className="text-5xl md:text-6xl lg:text-7xl font-black text-red-500 mb-4 relative z-10 drop-shadow-[0_0_20px_rgba(239,68,68,0.6)] tracking-tighter">
                            {formatCurrency(perdidaMensual)} <span className="text-2xl md:text-3xl text-red-400/80 font-bold tracking-normal">/ mes</span>

                          </p>
                        </div>

                        <div className="space-y-4 mb-10 max-w-lg mx-auto text-slate-300">
                          <p>

                          </p>
                        </div>

                            onClick={() => setStep(4)}
                            onMouseEnter={() => setIsHovered(true)}
                            onMouseLeave={() => setIsHovered(false)}

                            <span className="relative z-10 uppercase tracking-wider text-sm md:text-base">Ver qué significa esto para mi negocio</span>
                            <CalendarIcon className={`relative z-10 w-5 h-5 transition-transform duration-300 ${isHovered ? 'scale-110' : ''}`} />

                        <button 
                          onClick={() => setStep(2)}

                        </button>

                      </div>
                    )}

                    {/* PANTALLA 4: EL IMPACTO EMOCIONAL */}
                    {step === 4 && (
                      <div className="animate-in fade-in zoom-in duration-700 text-center">
                        
                        <div className="flex justify-center mb-8">
                          <div className="bg-purple-500/10 p-5 rounded-full border border-purple-500/30 shadow-[0_0_40px_rgba(168,85,247,0.3)] relative backdrop-blur-sm animate-pulse">
                            <HeartCrackIcon className="w-12 h-12 text-purple-400" strokeWidth={2} />
                          </div>
                        </div>

                        <h2 className="text-2xl md:text-4xl font-extrabold text-slate-100 mb-8 tracking-tight max-w-2xl mx-auto">
                          Ver los números duele, pero ¿qué significa esto realmente en tu vida?
                        </h2>

                        <div className="bg-slate-900/40 border border-slate-700/50 rounded-3xl p-8 md:p-10 mb-10 relative overflow-hidden text-left shadow-xl">
                          <div className="absolute inset-0 bg-purple-500/5 pointer-events-none"></div>
                          <p className="text-lg md:text-xl text-slate-300 leading-relaxed relative z-10">
                            Esos <strong className="text-red-400 font-bold">{formatCurrency(perdidaMensual * 12)}</strong> anuales que se están esfumando representan <span className="text-amber-400 font-semibold">[meses de tranquilidad financiera / la expansión de tu negocio / el tiempo libre que no tienes por trabajar horas extra]</span>.

                            onClick={() => setStep(5)}
                            onMouseEnter={() => setIsHovered(true)}
                            onMouseLeave={() => setIsHovered(false)}
                            className="group relative inline-flex items-center justify-center gap-3 px-8 py-4 bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white text-lg font-black rounded-full transition-all duration-300 shadow-[0_0_30px_rgba(168,85,247,0.4)] hover:shadow-[0_0_40px_rgba(168,85,247,0.6)] transform hover:-translate-y-1 w-full sm:w-auto"
                          >
                            <span className="relative z-10 uppercase tracking-wider text-sm md:text-base">¿Cómo detengo esta fuga?</span>
                            <ArrowRightIcon className={`relative z-10 w-5 h-5 transition-transform duration-300 ${isHovered ? 'translate-x-1' : ''}`} />

                        <button 
                          onClick={() => setStep(3)}

                          </div>
                        </div>

                              <div className="flex-shrink-0 w-8 h-8 rounded-full bg-blue-500/20 text-blue-400 flex items-center justify-center font-bold border border-blue-500/30">1</div>
                              <p className="text-slate-300 text-base md:text-lg">

                              <div className="flex-shrink-0 w-8 h-8 rounded-full bg-blue-500/20 text-blue-400 flex items-center justify-center font-bold border border-blue-500/30">2</div>

                              </p>
                            </div>
                          </div>

                          <div className="bg-slate-900/50 border border-slate-700/50 rounded-2xl p-6 relative overflow-hidden group hover:border-blue-500/50 transition-colors">
                            <div className="flex gap-4 items-start">
                              <div className="flex-shrink-0 w-8 h-8 rounded-full bg-blue-500/20 text-blue-400 flex items-center justify-center font-bold border border-blue-500/30">3</div>
                              <p className="text-slate-300 text-base md:text-lg">

                          </p>
                        </div>

                        <div className="flex flex-col items-center justify-center gap-4">
                          <button 
                            onClick={() => setStep(6)}
                            onMouseEnter={() => setIsHovered(true)}
                            onMouseLeave={() => setIsHovered(false)}
                            className="group relative inline-flex items-center justify-center gap-3 px-8 py-4 bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-500 hover:to-cyan-500 text-white text-lg font-black rounded-full transition-all duration-300 shadow-[0_0_30px_rgba(59,130,246,0.4)] hover:shadow-[0_0_40px_rgba(59,130,246,0.6)] transform hover:-translate-y-1 w-full sm:w-auto"
                          >
                            <span className="relative z-10 uppercase tracking-wider text-sm md:text-base">Ver la Solución Definitiva</span>
                            <ArrowRightIcon className={`relative z-10 w-5 h-5 transition-transform duration-300 ${isHovered ? 'translate-x-1' : ''}`} />
                          </button>
                        </div>

                        <div className="flex justify-center">
                          <button 
                            onClick={() => setStep(4)}
                            className="mt-8 text-slate-400 hover:text-white text-sm underline underline-offset-4 transition-colors"
                          >
                            Volver al Diagnóstico
                          </button>
                        </div>

                      </div>
                    )}

                    {/* PANTALLA 6: EL CIERRE HACIA LA AUDITORÍA */}
                    {step === 6 && (
                      <div className="animate-in fade-in zoom-in duration-700 text-center">
                        
                        <div className="flex justify-center mb-8">
                          <div className="bg-emerald-500/10 p-5 rounded-full border border-emerald-500/30 shadow-[0_0_40px_rgba(16,185,129,0.3)] relative backdrop-blur-sm animate-pulse">
                            <PhoneIcon className="w-12 h-12 text-emerald-400" strokeWidth={2} />
                          </div>
                        </div>

                        <h2 className="text-3xl md:text-4xl font-extrabold text-slate-100 mb-8 tracking-tight max-w-2xl mx-auto">
                          Cierra la Fuga desde la Raíz.
                        </h2>

                        <div className="bg-slate-900/40 border border-slate-700/50 rounded-3xl p-8 md:p-10 mb-10 relative overflow-hidden text-left shadow-xl">
                          <div className="absolute inset-0 bg-emerald-500/5 pointer-events-none"></div>
                          <p className="text-lg md:text-xl text-slate-300 leading-relaxed relative z-10 mb-6">
                            Tienes dos opciones: Puedes cerrar esta página y seguir perdiendo <strong className="text-red-400 font-bold">{formatCurrency(perdidaMensual)}</strong> mensuales, o puedes dejarnos auditar tu proceso.
                          </p>
                          <p className="text-lg md:text-xl text-slate-300 leading-relaxed relative z-10 mb-8">
                            En Prospecta, instalamos la Arquitectura de Persuasión en tu negocio (textos probados, seguimiento y optimización de tu perfil) para que el cliente te 'jale' hacia la venta.
                          </p>
                          
                          <div className="bg-emerald-950/30 border border-emerald-900/50 rounded-xl p-6 relative z-10">
                            <p className="text-emerald-200 text-base md:text-lg leading-relaxed font-medium">
                              Reserva una Auditoría de Embudos gratuita de 15 Minutos conmigo. Te mostraré el punto exacto donde tus prospectos se caen. Si nuestro sistema Prospecta te puede ayudar a recuperar esos ingresos, te diremos cómo. Si no es para ti, te lo diremos con total honestidad y nos despedimos como amigos. ¿Te parece justo?
                            </p>
                          </div>
                        </div>

                        <div className="flex flex-col items-center justify-center gap-4">
                          <a 
                            href={`https://wa.me/524425480329?text=Agendar%20mi%20Auditor%C3%ADa%20Gratuita%20y%20Detener%20la%20Fuga`}
                            target="_blank"
                            rel="noopener noreferrer"
                            onMouseEnter={() => setIsHovered(true)}
                            onMouseLeave={() => setIsHovered(false)}
                            className="group relative inline-flex items-center justify-center gap-3 px-8 py-5 bg-gradient-to-r from-emerald-600 to-green-500 hover:from-emerald-500 hover:to-green-400 text-white text-lg md:text-xl font-black rounded-full transition-all duration-300 shadow-[0_0_40px_rgba(16,185,129,0.4)] hover:shadow-[0_0_50px_rgba(16,185,129,0.6)] transform hover:-translate-y-1 w-full sm:w-auto"
                          >
                            <span className="relative z-10 tracking-wide text-center">Agendar mi Auditoría Gratuita y Detener la Fuga</span>
                            <PhoneIcon className={`relative z-10 w-6 h-6 transition-transform duration-300 ${isHovered ? 'rotate-12 scale-110' : ''}`} />
                          </a>
                        </div>

                        <button 
                          onClick={() => setStep(5)}
                          className="mt-8 text-slate-400 hover:text-white text-sm underline underline-offset-4 transition-colors"
                        >
                          Volver a los tips
                        </button>

                      </div>
                    )}

                  </div>
                </main>
              </div>

              <footer className="mt-8 pb-2 text-slate-500 text-sm font-medium tracking-wider text-center relative z-10">
                <p>Derechos Reservados | Prospecta | 2026</p>
              </footer>

            </div>
          );
        }

        // --- Montar la aplicación en el navegador ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
